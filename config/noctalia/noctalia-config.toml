[backdrop]
enabled = true

[bar.default]
center = [ "workspaces" ]
contact_shadow = true
end = [ "tray", "network", "bluetooth", "input_volume", "output_volume", "battery", "brightness", "control-center" ]
start = [ "launcher", "clock", "group:g1", "media" ]

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g1"
    members = [ "sysmon", "temp", "ram", "cpu" ]
    opacity = 0.0
    padding = 6.0

[calendar]
enabled = true

    [calendar.account.personal_google]
    name = "sv_cal"
    type = "google"

[desktop_widgets]
enabled = false
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
cross_axis_padding = 6
enabled = true
icon_size = 35
item_spacing = 5
launcher_icon = "list-search"
launcher_position = "start"
main_axis_padding = 12
margin_edge = 12

[keybinds]
down = [ "Ctrl+j", "Ctrl+n" ]
left = [ "Ctrl+h" ]
right = [ "Ctrl+l" ]
up = [ "Ctrl+k", "Ctrl+p" ]
validate = [ "Ctrl+y", "Return" ]

[location]
address = "Ho Chi Minh City"

[lockscreen_widgets]
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 540.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[nightlight]
temperature_day = 10000

[osd.kinds]
media = false

[plugins]
enabled = []

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

[shell]
avatar_path = "/home/suwapotta/nixos-dotfiles/images/pfp/youmu.png"
corner_radius_scale = 1.7500000260770321
font_family = "Work Sans SemiBold"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true

    [shell.panel]
    open_near_click_control_center = true
    session_placement = "centered"

    [shell.screen_corners]
    enabled = true

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "primary"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    enabled = true
    shortcut = "2"
    variant = "primary"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "3"
    variant = "secondary"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "4"
    variant = "destructive"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "5"
    variant = "destructive"

[theme]
builtin = "Catppuccin"
mode = "dark"
source = "builtin"

    [theme.templates]
    builtin_ids = [ "niri" ]
    community_ids = [ "zen-browser" ]

[wallpaper]
directory = "/home/suwapotta/nixos-dotfiles/images/wallpapers"
transition_on_startup = true

[widget.active_window]
display = "icon_only"
title_scroll = "on_hover"

[widget.cat]
type = "noctalia/bongocat:cat"

[widget.control-center]
custom_image = "/home/suwapotta/nixos-dotfiles/images/logos/nixos-flake.png"

[widget.cpu]
show_label = false

[widget.launcher]
custom_image = "/home/suwapotta/nixos-dotfiles/images/icons/niri.svg"

[widget.media]
min_length = 0
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.ram]
show_label = false

[widget.sysmon]
show_label = false
stat = "disk_pct"

[widget.temp]
show_label = false

[widget.tray]
detached_panel = true
drawer = true

[widget.workspaces]
capsule_radius = 8
